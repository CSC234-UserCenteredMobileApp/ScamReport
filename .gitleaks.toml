# gitleaks config — ScamReport
#
# Extends gitleaks' default ruleset and adds a project-specific allowlist for
# Firebase client API keys. Those keys are PUBLIC by design (Google publishes
# them inside compiled Android APKs and web bundles) and are not credentials
# in the traditional sense. Security comes from Firebase Auth domain
# restrictions, Firestore security rules (`firestore.rules`), and App Check —
# not from key secrecy. See:
#   https://firebase.google.com/docs/projects/api-keys
#
# Real Firebase secrets (the service-account JSON for the Admin SDK) are
# gitignored as `*service-account*.json` / `*firebase-adminsdk*.json` and are
# still scanned for under their own rules.

title = "ScamReport gitleaks"

[extend]
useDefault = true

[allowlist]
description = "Firebase client API keys auto-generated by `flutterfire configure` into apps/mobile/lib/firebase_options.dart. Public by design."
paths = [
  '''apps/mobile/lib/firebase_options\.dart''',
]
