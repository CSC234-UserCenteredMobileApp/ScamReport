name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Nightly 03:00 UTC. Picks up upstream advisories landing between PRs.
    - cron: '0 3 * * *'

# Tighten default token. The jobs below need only read access to the repo;
# upgrading any single job to write requires per-job permissions override.
permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: '8.21.2'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Run the gitleaks binary directly so we don't hit the
      # gitleaks-action@v2 license requirement that applies to GitHub
      # organisations. The CLI itself is MIT-licensed.
      - name: Install gitleaks
        run: |
          set -e
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tgz
          tar -xzf gitleaks.tgz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        run: gitleaks detect --no-banner --redact --verbose --exit-code 1

  bun-audit:
    name: Dependency audit (bun audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      # Per the security-reviewer agent's policy: zero high/critical findings
      # blocks the merge; moderate findings are allowed but get logged below
      # so the security-reviewer agent can pick them up in its report.
      - name: Run bun audit (fails on high or critical only)
        run: bun audit --prod --audit-level=high

      - name: Log moderate / low findings (non-blocking)
        if: always()
        run: bun audit --prod || true

  dart-analyze:
    name: Static analysis (dart analyze --fatal-infos)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: stable
          cache: true

      - name: Fetch Flutter deps
        run: flutter pub get

      - name: Static analysis
        run: dart analyze --fatal-infos
