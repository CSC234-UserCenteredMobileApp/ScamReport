name: mobile
description: ScamReport mobile app
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.0
  go_router: ^14.6.0
  http: ^1.2.0
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.0
  firebase_messaging: ^15.1.0
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.0
  cloud_firestore: ^5.5.0
  firebase_remote_config: ^5.1.0
  local_auth: ^2.3.0
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  google_fonts: ^6.2.0
  permission_handler: ^11.3.0
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.21.0
  build_runner: ^2.4.13
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  generate: true
